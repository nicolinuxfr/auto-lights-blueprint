blueprint:
  name: "Lumières automatiques (2026.3.5)"
  description: |-
    Allume et éteint automatiquement des lumières en fonction de capteurs binaires (capteurs de mouvement, capteurs d'ouverture, etc.), avec des conditions d'éclairage et des interrupteurs de contrôle optionnels.

    Version : 2026.3.5 — [Changelog](https://github.com/nicolinuxfr/auto-lights-blueprint/blob/main/CHANGELOG.md#202635)
  domain: automation
  source_url: https://github.com/nicolinuxfr/auto-lights-blueprint/blob/main/template.yaml
  input:
    lights:
      name: "Lumières"
      description: "Les lumières à contrôler automatiquement."
      selector:
        target:
          entity:
            domain: light
    sensors:
      name: "Capteurs"
      description: "Capteurs binaires qui déclenchent les lumières (capteurs de mouvement, capteurs d'ouverture de porte/fenêtre, etc.)."
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    off_delay:
      name: "Délai d'extinction"
      description: "Temps à attendre avant d'éteindre les lumières après qu'un capteur est devenu inactif."
      default:
        hours: 0
        minutes: 2
        seconds: 0
      selector:
        duration:
    conditions_settings:
      name: "Conditions d'éclairage"
      icon: mdi:weather-sunny
      description: "Restreindre l'allumage selon la position du soleil ou la luminosité ambiante."
      collapsed: true
      input:
        night_only:
          name: "Uniquement la nuit"
          description: "Quand activé, les lumières ne s'allument que lorsque le soleil est couché. Utilise l'entité soleil intégrée à Home Assistant."
          default: false
          selector:
            boolean:
        light_sensors:
          name: "Capteurs de luminosité (optionnel)"
          description: "Capteurs d'éclairement à vérifier avant d'allumer les lumières. Si plusieurs capteurs sont sélectionnés, la valeur moyenne est utilisée."
          default: []
          selector:
            entity:
              domain: sensor
              device_class: illuminance
              multiple: true
        light_threshold:
          name: "Seuil de luminosité"
          description: "Les lumières ne s'allumeront que si la luminosité moyenne est inférieure à cette valeur (en lux). Ignoré si aucun capteur de luminosité n'est sélectionné."
          default: 30
          selector:
            number:
              min: 0
              max: 1000
              unit_of_measurement: lx
              mode: box
    advanced_settings:
      name: "Paramètres avancés"
      icon: mdi:cog-outline
      description: "Comportement des portes et interrupteurs de contrôle."
      collapsed: true
      input:
        keep_on_open_doors:
          name: "Maintenir avec portes ouvertes"
          description: "Quand activé, les capteurs de porte/fenêtre ouverts empêchent l'extinction des lumières. Quand désactivé (par défaut), seuls les capteurs de mouvement/présence sont vérifiés — les portes ouvertes ne maintiennent pas les lumières."
          default: false
          selector:
            boolean:
        control_entities:
          name: "Interrupteurs de contrôle (optionnel)"
          description: "Des input_boolean qui activent ou désactivent l'automatisation. Tous les interrupteurs sélectionnés doivent être activés pour que l'automatisation fonctionne. Laisser vide pour que l'automatisation soit toujours active."
          default: []
          selector:
            entity:
              domain: input_boolean
              multiple: true

mode: restart
max_exceeded: silent

trigger_variables:
  control_var: !input control_entities

variables:
  control_entities: !input control_entities
  sensors: !input sensors
  keep_on_open_doors: !input keep_on_open_doors
  light_sensors: !input light_sensors
  light_threshold: !input light_threshold
  night_only: !input night_only

trigger:
  - platform: state
    entity_id: !input sensors
    to: "on"
    not_from:
      - "unavailable"
      - "unknown"
    id: sensor_on
  - platform: state
    entity_id: !input sensors
    to: "off"
    not_from:
      - "unavailable"
      - "unknown"
    id: sensor_off
  - platform: template
    value_template: >-
      {{ control_var not in (none, [], '') and
         expand(control_var) | rejectattr('state', 'eq', 'on') | list | count == 0 }}
    id: control_on
  - platform: template
    value_template: >-
      {{ control_var not in (none, [], '') and
         expand(control_var) | selectattr('state', 'eq', 'off') | list | count > 0 }}
    id: control_off
  - platform: state
    entity_id: !input sensors
    from: "unavailable"
    to: "off"
    id: ha_start
  - platform: state
    entity_id: !input sensors
    from: "unknown"
    to: "off"
    id: ha_start

action:
  - choose:
      - conditions:
          - condition: trigger
            id:
              - sensor_on
              - control_on
          - condition: template
            value_template: >-
              {% if trigger.id == 'control_on' %}
                {{ expand(sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
              {% else %}
                {{ trigger.from_state.state not in ['unavailable', 'unknown'] }}
              {% endif %}
          - condition: template
            value_template: >-
              {{ control_entities in (none, [], '') or
                 expand(control_entities) | rejectattr('state', 'eq', 'on') | list | count == 0 }}
          - condition: template
            value_template: >-
              {{ trigger.id == 'control_on' or keep_on_open_doors or
                 state_attr(trigger.entity_id, 'device_class') in ['motion', 'occupancy', 'presence'] }}
          - condition: template
            value_template: >-
              {% set ls = light_sensors %}
              {% set thr = light_threshold | float(0) %}
              {% set has_night = night_only %}
              {% set has_lux = ls not in (none, [], '') and thr > 0 %}
              {% set night_ok = has_night and is_state('sun.sun', 'below_horizon') %}
              {% set lux_ok = has_lux and
                 (expand(ls) | map(attribute='state') | map('float', 0) | sum /
                  [expand(ls) | list | count, 1] | max) < thr %}
              {{ (not has_night and not has_lux) or night_ok or lux_ok }}
        sequence:
          - action: light.turn_on
            target: !input lights
      - conditions:
          - condition: trigger
            id:
              - sensor_off
              - control_off
              - ha_start
        sequence:
          - delay: !input off_delay
          - condition: template
            value_template: >-
              {{ trigger.id == 'control_off' or
                 control_entities in (none, [], '') or
                 expand(control_entities) | rejectattr('state', 'eq', 'on') | list | count == 0 }}
          - condition: template
            value_template: >-
              {% if not keep_on_open_doors %}
                {{ expand(sensors)
                   | selectattr('attributes.device_class', 'in', ['motion', 'occupancy', 'presence'])
                   | selectattr('state', 'eq', 'on')
                   | list | count == 0 }}
              {% else %}
                {{ expand(sensors)
                   | selectattr('state', 'eq', 'on')
                   | list | count == 0 }}
              {% endif %}
          - action: light.turn_off
            target: !input lights
