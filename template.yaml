blueprint:
  name: "[[blueprint.name]] ([[blueprint.version]])"
  description: |-
    [[blueprint.description]]

    [[blueprint.version.line]] — [Changelog](https://github.com/nicolinuxfr/auto-lights-blueprint/blob/main/CHANGELOG.md#[[blueprint.version.nodots]])
  domain: automation
  source_url: https://github.com/nicolinuxfr/auto-lights-blueprint/blob/main/template.yaml
  input:
    lights:
      name: "[[input.lights.name]]"
      description: "[[input.lights.description]]"
      selector:
        target:
          entity:
            domain: light
    sensors:
      name: "[[input.sensors.name]]"
      description: "[[input.sensors.description]]"
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    off_delay:
      name: "[[input.off_delay.name]]"
      description: "[[input.off_delay.description]]"
      default:
        hours: 0
        minutes: 2
        seconds: 0
      selector:
        duration:
    conditions_settings:
      name: "[[section.conditions]]"
      icon: mdi:weather-sunny
      description: "[[section.conditions.description]]"
      collapsed: true
      input:
        night_only:
          name: "[[input.night_only.name]]"
          description: "[[input.night_only.description]]"
          default: false
          selector:
            boolean:
        light_sensors:
          name: "[[input.light_sensors.name]]"
          description: "[[input.light_sensors.description]]"
          default: []
          selector:
            entity:
              domain: sensor
              device_class: illuminance
              multiple: true
        light_threshold:
          name: "[[input.light_threshold.name]]"
          description: "[[input.light_threshold.description]]"
          default: 30
          selector:
            number:
              min: 0
              max: 1000
              unit_of_measurement: lx
              mode: box
    advanced_settings:
      name: "[[section.advanced]]"
      icon: mdi:cog-outline
      description: "[[section.advanced.description]]"
      collapsed: true
      input:
        keep_on_open_doors:
          name: "[[input.keep_on_open_doors.name]]"
          description: "[[input.keep_on_open_doors.description]]"
          default: false
          selector:
            boolean:
        control_entities:
          name: "[[input.control_entities.name]]"
          description: "[[input.control_entities.description]]"
          default: []
          selector:
            entity:
              domain: input_boolean
              multiple: true

mode: restart
max_exceeded: silent

trigger_variables:
  control_var: !input control_entities

variables:
  control_entities: !input control_entities
  sensors: !input sensors
  keep_on_open_doors: !input keep_on_open_doors
  light_sensors: !input light_sensors
  light_threshold: !input light_threshold
  night_only: !input night_only

trigger:
  - platform: state
    entity_id: !input sensors
    to: "on"
    not_from:
      - "unavailable"
      - "unknown"
    id: sensor_on
  - platform: state
    entity_id: !input sensors
    to: "off"
    not_from:
      - "unavailable"
      - "unknown"
    id: sensor_off
  - platform: template
    value_template: >-
      {{ control_var not in (none, [], '') and
         expand(control_var) | rejectattr('state', 'eq', 'on') | list | count == 0 }}
    id: control_on
  - platform: template
    value_template: >-
      {{ control_var not in (none, [], '') and
         expand(control_var) | selectattr('state', 'eq', 'off') | list | count > 0 }}
    id: control_off
  - platform: state
    entity_id: !input sensors
    from: "unavailable"
    to: "off"
    id: ha_start
  - platform: state
    entity_id: !input sensors
    from: "unknown"
    to: "off"
    id: ha_start

action:
  - choose:
      - conditions:
          - condition: trigger
            id:
              - sensor_on
              - control_on
          - condition: template
            value_template: >-
              {% if trigger.id == 'control_on' %}
                {{ expand(sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
              {% else %}
                {{ trigger.from_state.state not in ['unavailable', 'unknown'] }}
              {% endif %}
          - condition: template
            value_template: >-
              {{ control_entities in (none, [], '') or
                 expand(control_entities) | rejectattr('state', 'eq', 'on') | list | count == 0 }}
          - condition: template
            value_template: >-
              {{ trigger.id == 'control_on' or keep_on_open_doors or
                 state_attr(trigger.entity_id, 'device_class') in ['motion', 'occupancy', 'presence'] }}
          - condition: template
            value_template: >-
              {% set ls = light_sensors %}
              {% set thr = light_threshold | float(0) %}
              {% set has_night = night_only %}
              {% set has_lux = ls not in (none, [], '') and thr > 0 %}
              {% set night_ok = has_night and is_state('sun.sun', 'below_horizon') %}
              {% set lux_ok = has_lux and
                 (expand(ls) | map(attribute='state') | map('float', 0) | sum /
                  [expand(ls) | list | count, 1] | max) < thr %}
              {{ (not has_night and not has_lux) or night_ok or lux_ok }}
        sequence:
          - action: light.turn_on
            target: !input lights
      - conditions:
          - condition: trigger
            id:
              - sensor_off
              - control_off
              - ha_start
        sequence:
          - delay: !input off_delay
          - condition: template
            value_template: >-
              {{ trigger.id == 'control_off' or
                 control_entities in (none, [], '') or
                 expand(control_entities) | rejectattr('state', 'eq', 'on') | list | count == 0 }}
          - condition: template
            value_template: >-
              {% if not keep_on_open_doors %}
                {{ expand(sensors)
                   | selectattr('attributes.device_class', 'in', ['motion', 'occupancy', 'presence'])
                   | selectattr('state', 'eq', 'on')
                   | list | count == 0 }}
              {% else %}
                {{ expand(sensors)
                   | selectattr('state', 'eq', 'on')
                   | list | count == 0 }}
              {% endif %}
          - action: light.turn_off
            target: !input lights
